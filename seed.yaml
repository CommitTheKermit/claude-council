goal: Build a collaborative Claude Code session tool where multiple participants vote
  on Claude's AskUserQuestion via Discord bot, using TypeScript Agent SDK's canUseTool
  callback to intercept questions, broadcast to Discord, collect votes, and inject
  the consensus answer back to Claude
task_type: code
brownfield_context:
  project_type: brownfield
  context_references:
  - path: ./src
    role: primary
    summary: TypeScript Agent SDK + discord.js project with canUseTool interception
      handler, vote tallying logic, MessagingAdapter abstraction, and DiscordAdapter
      skeleton
  - path: stt-verify-agent
    role: reference
    summary: Kotlin/Koog STT verification agent with askUser tool - UX and structure
      reference only, no code reuse
  existing_patterns:
  - canUseTool callback to intercept AskUserQuestion tool calls
  - MessagingAdapter abstraction layer for channel backends (Discord now, Slack later)
  - Vote tallying with quorum check and host fallback
  - Vitest for unit testing
  existing_dependencies:
  - '@anthropic-ai/claude-agent-sdk'
  - discord.js
  - vitest
constraints:
- TypeScript + Claude Code Agent SDK (@anthropic-ai/claude-agent-sdk)
- Discord bot (discord.js) as sole messaging channel for MVP
- canUseTool callback for AskUserQuestion interception and answer injection
- 'Discord channel membership verification - only current channel members can vote'
- Default 3-minute vote timeout (configurable per session/question)
- Default majority quorum (configurable)
- Host fallback on tie or quorum failure
- MVP scope limited to multiple-choice questions only
- No Slack support in MVP
- No free-text 2-stage consensus in MVP
- No error recovery (bot down/session disconnect) in MVP
- Single Node.js runtime for bot + SDK integration
acceptance_criteria:
- '"Host starts Claude Code session via TS Agent SDK and canUseTool intercepts AskUserQuestion(multiple-choice)
  successfully"'
- '"Intercepted question with choices is forwarded to Discord channel as button vote"'
- '"Participants vote via Discord buttons and majority-voted answer is injected
  back to Claude"'
- '"Claude resumes work using the injected answer, verified by asserting canUseTool returns {behavior:allow, updatedInput.answers} with mocked SDK"'
- '"When quorum is not met within timeout, host receives fallback decision prompt"'
- '"When votes are tied at timeout, host receives fallback decision prompt"'
- '"When no one votes within 3 minutes, host receives fallback decision prompt and
  can answer directly"'
- '"Unit/integration tests with mocked Discord API cover vote tallying, timeout, and
  host fallback paths"'
- '"npm test passes green as code-level acceptance gate"'
ontology_schema:
  name: CollaborativeVoteSession
  description: Domain model for a multi-participant voting session that intercepts
    Claude Code agent questions and collects consensus answers via Discord
  fields:
  - name: sessionId
    type: string
    description: Unique identifier for the Claude Code agent session
    required: true
  - name: hostId
    type: string
    description: Discord user ID of the session starter who has fallback authority
    required: true
  - name: channelId
    type: string
    description: Discord channel where votes are broadcast
    required: true
  - name: participants
    type: array
    description: List of Discord member IDs eligible to vote (channel members)
    required: true
  - name: interceptedToolName
    type: string
    description: Name of the Claude tool intercepted by canUseTool callback (MVP - 'AskUserQuestion')
    required: true
  - name: question
    type: object
    description: The intercepted AskUserQuestion containing text and choices
    required: true
  - name: questionType
    type: string
    description: Type of question - multiple_choice only in MVP
    required: true
  - name: choices
    type: array
    description: 'Answer options for the multiple-choice question; array of objects {label: string, description?: string} mirroring AskUserQuestion option shape'
    required: true
  - name: votes
    type: object
    description: 'Map of participantId to selected choice label; last vote per participant wins'
    required: true
  - name: quorum
    type: number
    description: 'Minimum ratio of cast voters to total participants required for a valid vote (default 0.5). Quorum check: uniqueVoters/participants >= quorum'
    required: true
  - name: voteResolutionAlgorithm
    type: string
    description: '1) check quorum (uniqueVoters/participants >= quorum); 2) if met, winner = choice with plurality of cast votes; 3) tie among top choices OR quorum unmet OR no votes at timeout -> host fallback'
    required: true
  - name: timeoutSeconds
    type: number
    description: 'Vote window duration in seconds (default 180); countdown starts when the Discord message with voting buttons is posted'
    required: true
  - name: status
    type: string
    description: Current vote status - pending, active, resolved, fallback
    required: true
  - name: resolvedAnswer
    type: string
    description: Final answer (choice label) to inject back to Claude (set only after resolution)
    required: false
  - name: resolvedBy
    type: string
    description: How the answer was determined - majority, host_tiebreak, host_quorum_fail, host_timeout (set only after resolution)
    required: false
  - name: injectionPayload
    type: object
    description: 'canUseTool return injected to Claude: {behavior: "allow", updatedInput: {questions, answers: {<questionText>: <resolvedAnswer label>}}} (set only after resolution)'
    required: false
evaluation_principles:
- name: vote_integrity
  description: Vote tallying correctly determines majority winner and detects ties
    and quorum failures
  weight: 0.3
- name: intercept_inject_reliability
  description: canUseTool callback reliably intercepts AskUserQuestion and injects
    resolved answer back to Claude
  weight: 0.3
- name: discord_ux
  description: Questions and choices render clearly in Discord with intuitive button
    voting
  weight: 0.15
- name: fallback_correctness
  description: Host fallback activates correctly on timeout, tie, or quorum failure
  weight: 0.15
- name: test_coverage
  description: Automated tests cover core paths - tallying, timeout, fallback - with
    mocked Discord API
  weight: 0.1
exit_conditions:
- name: mvp_complete
  description: All three MVP scenarios pass automated and manual verification
  criteria: npm test green AND one successful manual e2e demo with real Discord channel
- name: vote_e2e_pass
  description: Multiple-choice vote end-to-end flow works
  criteria: Question intercepted, forwarded to Discord, votes collected, majority
    answer injected, Claude resumes
- name: fallback_pass
  description: Host fallback works on all trigger conditions
  criteria: Quorum failure, tie, and full timeout all correctly delegate to host
